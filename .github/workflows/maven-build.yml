---
name: Build & Release
on:
  push:
    branches: ['**']
  pull_request:
    branches: [main, release-v*]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
env:
  SETTINGS_XML: ${{ github.workspace }}/.mvn/settings.xml
  JAVA_VERSION: 21
  JAVA_DISTRIBUTION: temurin
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    outputs:
      project_version: ${{ steps.project_metadata.outputs.version }}
      is_release: ${{ steps.project_metadata.outputs.is_release }}
    env:
      IO_JFROG_SBB_POLARION_TOKEN: ${{ secrets.IO_JFROG_SBB_POLARION_TOKEN }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      MARKDOWN2HTML_MAVEN_PLUGIN_FAIL_ON_ERROR: true
      GITHUB_TOKEN: ${{ github.token }}  # Providing this prevents reaching the GitHub request limits
    steps:
      - name: 📄 Checkout the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
        with:
          fetch-depth: 0  # Sonar needs full history
          persist-credentials: false
      - name: 🧱 Set up JDK and Maven
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287  # v5.3.0
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven
      - name: 📝 Extract project metadata
        id: project_metadata
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          # Check if it is a release
          if [[ ! "${VERSION}" =~ -SNAPSHOT$ ]]; then
            IS_RELEASE=true
          else
            IS_RELEASE=false
          fi
          {
            echo "version=${VERSION}"
            echo "is_release=${IS_RELEASE}"
          } >> "$GITHUB_OUTPUT"
      - name: 🔍 Cache SonarQube packages
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8  # v6.0.0
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar
      - name: 📦 Build with Maven for Pushes
        if: github.event_name == 'push'
        env:
          BRANCH_NAME: ${{ github.ref_name }}
          IS_PUBLIC: ${{ github.event.repository.visibility == 'public' }}
          IS_TEMPLATE: ${{ github.event.repository.is_template }}
        run: |
          SONAR_ARGS=()
          if [ "${IS_PUBLIC}" = "true" ] && [ "${IS_TEMPLATE}" != "true" ]; then
            SONAR_ARGS+=(sonar:sonar "-Dsonar.exclusions=.github/**")
            if [ -n "${BRANCH_NAME}" ]; then
              SONAR_ARGS+=("-Dsonar.branch.name=${BRANCH_NAME}")
            fi
          fi
          # JS E2E (Playwright) tests run in the dedicated, per-browser sharded `e2e` job below
          mvn --batch-mode -s "${SETTINGS_XML}" clean verify -DskipJsTests=true "${SONAR_ARGS[@]}"
      - name: 📦 Build with Maven for PRs
        if: github.event_name == 'pull_request'
        env:
          GITHUB_HEAD_REF: ${{ github.head_ref }}
          GITHUB_BASE_REF: ${{ github.base_ref }}
          GITHUB_PR_NUMBER_REF: ${{ github.event.pull_request.number }}
          IS_PUBLIC: ${{ github.event.repository.visibility == 'public' }}
          IS_TEMPLATE: ${{ github.event.repository.is_template }}
        run: |
          SONAR_ARGS=()
          if [ "${IS_PUBLIC}" = "true" ] && [ "${IS_TEMPLATE}" != "true" ]; then
            SONAR_ARGS+=(sonar:sonar "-Dsonar.pullrequest.base=${GITHUB_BASE_REF}" "-Dsonar.pullrequest.branch=${GITHUB_HEAD_REF}" "-Dsonar.pullrequest.key=${GITHUB_PR_NUMBER_REF}" "-Dsonar.exclusions=.github/**")
          fi
          # JS E2E (Playwright) tests run in the dedicated, per-browser sharded `e2e` job below
          mvn --batch-mode -s "${SETTINGS_XML}" clean verify -DskipJsTests=true "${SONAR_ARGS[@]}"
      - name: 📋 Analyze dependencies
        run: mvn --batch-mode -s "${SETTINGS_XML}" dependency:analyze
        continue-on-error: false
      - name: 📦 Upload build artifacts
        # needed for uploads to GitHub Releases
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: maven-artifacts
          path: |
            target/*.jar
            target/*.pom
          retention-days: 1
          if-no-files-found: error
  # Playwright E2E tests, sharded one browser per job.
  #
  # Each matrix leg runs on its own runner and starts its own `npm run dev` server
  # (via playwright.config.js `webServer`), so the browsers no longer compete for a
  # single dev server's CPU. That contention - 2 workers x 3 browsers against one
  # server - was the root cause of the load-induced WebKit flakiness (the merge pane
  # never reaching diffsLoadingProgress === 100 within the timeout). fail-fast is off
  # so one browser's failure still lets the others report.
  e2e:
    name: E2E (${{ matrix.browser }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    defaults:
      run:
        working-directory: ui
    steps:
      - name: 📄 Checkout the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: 🧱 Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 24.17.0
          cache: npm
          cache-dependency-path: ui/package-lock.json
      - name: 🔢 Resolve Playwright version
        id: playwright-version
        run: echo "version=$(node -p "require('./package-lock.json').packages['node_modules/@playwright/test'].version")" >> "$GITHUB_OUTPUT"
      - name: 💾 Cache Playwright browser binaries
        # setup-node's `cache: npm` only caches the npm registry, not the browser
        # binaries under ~/.cache/ms-playwright. Cache them keyed on the Playwright
        # version so warm runs skip the ~100-200 MB per-browser download. System deps
        # (apt) aren't cached, so `install --with-deps` below still runs every time.
        uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8  # v6.0.0
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ matrix.browser }}-${{ steps.playwright-version.outputs.version }}
      - name: 📥 Install dependencies
        run: npm ci
      - name: 🌐 Install Playwright browser
        run: npx playwright install --with-deps ${{ matrix.browser }}
      - name: 🧪 Run Playwright E2E tests
        run: npx playwright test --project=${{ matrix.browser }} --reporter=list,html
      - name: 📤 Upload Playwright report and traces
        # test-results/ holds the per-test traces (trace: retain-on-failure) needed
        # to diagnose failures; playwright-report/ is the browsable HTML report.
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: playwright-report-${{ matrix.browser }}
          path: |
            ui/playwright-report/
            ui/test-results/
          retention-days: 3
          if-no-files-found: ignore
  # Deploy releases to Maven Central from main and LTS branches (release-v*)
  # See RELEASE.md for LTS branch documentation
  deploy-maven-central:
    needs: [build, e2e]
    if: ${{ needs.build.outputs.is_release == 'true' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release-v')) }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    env:
      COM_SONATYPE_CENTRAL_POLARION_OPENSOURCE_USERNAME: ${{ secrets.COM_SONATYPE_CENTRAL_POLARION_OPENSOURCE_USERNAME }}
      COM_SONATYPE_CENTRAL_POLARION_OPENSOURCE_TOKEN: ${{ secrets.COM_SONATYPE_CENTRAL_POLARION_OPENSOURCE_TOKEN }}
      COM_SONATYPE_CENTRAL_POLARION_OPENSOURCE_GPG_PASSPHRASE: ${{ secrets.COM_SONATYPE_CENTRAL_POLARION_OPENSOURCE_GPG_PASSPHRASE }}
      GITHUB_TOKEN: ${{ github.token }}  # Providing this prevents reaching the GitHub request limits
    steps:
      - name: 📄 Checkout the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: 🧱 Set up JDK and Maven with cache
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287  # v5.3.0
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven
          gpg-private-key: ${{ secrets.COM_SONATYPE_CENTRAL_POLARION_OPENSOURCE_GPG_PRIVATE_KEY }}
      - name: 📦 Deploy to Maven Central
        # This cannot be implemented using deploy:deploy-file
        # The central-publishing-maven-plugin must be used instead due to specific deployment requirements
        # Additionally, timeouts are set to 1 hour to avoid issues with the connection to Sonatype Central during deployment
        run: |
          mvn --batch-mode -s "${SETTINGS_XML}" clean deploy \
            -Dmaven.test.skip=true \
            -P gpg-sign \
            -P central-publishing \
            -Dcentral.timeout=3600 \
            -Dmaven.wagon.http.connectionTimeout=3600000 \
            -Dmaven.wagon.http.readTimeout=3600000 \
            -Dcentral-publishing-maven-plugin.autoPublish=${{ github.event.repository.visibility == 'public' }}
  # Deploy to GitHub Packages (snapshots from main only) and upload release assets to GitHub Release
  # LTS branches (release-v*) only upload release assets, no snapshot deployment
  deploy-github-packages:
    needs: [build, e2e]
    if: ${{ github.ref == 'refs/heads/main' || (needs.build.outputs.is_release == 'true' && startsWith(github.ref, 'refs/heads/release-v')) }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    env:
      GITHUB_TOKEN: ${{ github.token }}
      GITHUB_REPO_NAME: ${{ github.repository }}
      PROJECT_VERSION: ${{ needs.build.outputs.project_version }}
    steps:
      - name: 📄 Checkout the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: 📥 Download build artifacts
        # The artifacts are generated in the 'build' step
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: maven-artifacts
          path: target/
      - name: 🧱 Set up JDK and Maven
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287  # v5.3.0
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven
      - name: 📦 Deploy to GitHub Packages
        # Releases should only be deployed to GitHub Packages when the repo is private
        # Snapshots are always deployed to GitHub Packages
        if: ${{ needs.build.outputs.is_release == 'false' || github.event.repository.visibility == 'private' }}
        run: |
          mvn --batch-mode -s "${SETTINGS_XML}" deploy \
            -Dmaven.test.skip=true \
            -Dmaven.javadoc.skip=true \
            -Dmaven.source.skip=true \
            -P deploy-github-packages
      - name: 📦 Upload assets to GitHub Release
        if: ${{ needs.build.outputs.is_release == 'true' }}
        run: |-
          gh release upload "v${PROJECT_VERSION}" "target/*-${PROJECT_VERSION}.jar" --clobber
